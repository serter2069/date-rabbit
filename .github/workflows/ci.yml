name: CI
on:
  pull_request:
    branches: [main, development]
  push:
    branches: [main, development]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npx tsc --noEmit
      - run: ESLINT_USE_FLAT_CONFIG=false npx eslint@8 . --ext .ts,.tsx --max-warnings 0
      - name: API TypeScript check
        run: cd api && npm ci && npx tsc --noEmit
